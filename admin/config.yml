# =========================================================================
# ANGEL JEWELLERY — LIGHTWEIGHT ADMINISTRATIVE CONFIGURATION SYSTEM
# =========================================================================
backend:
  name: git-gateway
  branch: main # Tracks your active server deployment branch hook

media_folder: "assets/products" # Destination folder where uploaded mobile photos are saved
public_folder: "assets/products" # Path structural reference route inside code indices

# Visual Dashboard custom luxury dark brand skin styles
theme:
  primary_color: "#dfba6b"
  background_color: "#0a0a0a"
  text_color: "#ffffff"

collections:
  - name: "products"
    label: "Jewellery Catalog Items"
    folder: "data" # We store data inside a clean structured JSON file
    extension: "json"
    format: "json"
    create: true # Permits you to click 'Add New Product' right from mobile
    slug: "{{title}}"
    identifier_field: "id"
    fields:
      - { label: "Unique Item ID", name: "id", widget: "number", value_type: "int" }
      - { label: "Masterpiece Title", name: "title", widget: "string" }
      - { 
          label: "Design Category", 
          name: "category", 
          widget: "select", 
          options: ["necklace", "earrings", "rings", "bracelets"] 
        }
      - { label: "Retail Value Price (₹)", name: "price", widget: "number", value_type: "int" }
      - { label: "Display Photograph Media", name: "image", widget: "image" }
      - { 
          label: "Inventory Alert Tag Badge", 
          name: "badge", 
          widget: "select", 
          options: ["", "New In", "Sold Out"],
          required: false 
        }