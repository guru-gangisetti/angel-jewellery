# =========================================================================
# ANGEL JEWELLERY — UNIFIED LEDGER CONFIGURATION LIST SETUP
# =========================================================================
backend:
  name: github
  repo: https://github.com/guru-gangisetti/angel-jewellery
  branch: main
  site_domain: https://angel-jewellery.netlify.app/

media_folder: "images"
public_folder: "images"

collections:
  - name: "catalog"
    label: "Inventory Core Data Files"
    files:
      - file: "data/products.json" # Points precisely to your primary data ledger
        label: "Jewellery Master Catalog"
        name: "products"
        fields:
          - name: "products"
            label: "Product Matrix Database Loop"
            widget: "list" # Forces a single continuous array list structure
            fields:
              - { label: "Unique Item ID", name: "id", widget: "number", value_type: "int" }
              - { label: "Masterpiece Title", name: "title", widget: "string" }
              - { 
                  label: "Design Category", 
                  name: "category", 
                  widget: "select", 
                  options: ["necklace", "earrings", "rings", "bracelets"] 
                }
              - { label: "Retail Value Price (₹)", name: "price", widget: "number", value_type: "int" }
              - { label: "Display Photograph Media", name: "image", widget: "image" }
              - { 
                  label: "Inventory Alert Tag Badge", 
                  name: "badge", 
                  widget: "select", 
                  options: ["Sale", "New In", "Sold Out"],
                  required: false 
                }